---
- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Remove old nginx configs
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-enabled/nestjs-app.conf
    - /etc/nginx/sites-available/nestjs-app.conf

- name: Create Nginx virtual host config
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ server_name }}"
    mode: '0644'

- name: Enable site by creating symlink
  file:
    src: "/etc/nginx/sites-available/{{ server_name }}"
    dest: "/etc/nginx/sites-enabled/{{ server_name }}"
    state: link
  notify: restart nginxx
